apiVersion: v1
kind: Namespace
metadata:
  name: aimock
  labels:
    name: aimock
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aimock-config
  namespace: aimock
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:5432/aimock"
  REDIS_URL: "redis://redis:6379/0"
  API_URL: "http://kong:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: aimock-secrets
  namespace: aimock
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
